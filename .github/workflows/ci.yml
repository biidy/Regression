name: CI/CD - Test, Train & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Récupérer le code ──────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── 2. Installer Python ───────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ── 3. Installer les dépendances ──────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Créer les dossiers nécessaires ─────────────────────
      - name: Create directories
        run: mkdir -p models

      # ── 5. TESTS AVANT LANCEMENT (teste le code) ──────────────
      '''- name: Run pre-launch tests
        run: |
          echo " Tests du code AVANT entraînement..."
          pytest tests/test_preprocess.py -v
          pytest tests/test_train.py -v
          pytest tests/test_predict.py -v
          echo " Tous les tests pre-launch passés" '''

      # ── 6. ENTRAINEMENT de tous les modèles ───────────────────
      - name: Train & compare all models
        run: |
          echo "Lancement de l'entraînement..."
          python src/train.py

      # ── 7. TESTS APRES LANCEMENT (teste les résultats) ────────
      '''- name: Run post-launch tests
        run: |
          echo " Tests des résultats APRES entraînement..."
          pytest tests/test_model.py -v
          echo " Tous les tests post-launch passés" '''

      # ── 8. Afficher le meilleur modèle ────────────────────────
      - name: Show best model
        run: |
          python -c "
          import json
          with open('models/all_results.json') as f:
              d = json.load(f)
          print('=' * 50)
          print(f'Meilleur modele : {d[\"best_model\"]}')
          print(f'R2   : {d[\"best_metrics\"][\"R2\"]:.4f}')
          print(f'RMSE : {d[\"best_metrics\"][\"RMSE\"]:.4f}')
          print(f'MAE  : {d[\"best_metrics\"][\"MAE\"]:.4f}')
          print('=' * 50)
          "

      # ── 9. DEPLOIEMENT HuggingFace (seulement sur main) ───────
      - name: Deploy to HuggingFace
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path='.',
              repo_id='advertising-predict-pro/advertising-regression',
              repo_type='space',
              token='$HF_TOKEN',
              ignore_patterns=['data/', '.git/', '__pycache__/']
          )
          print('Déploiement HuggingFace réussi')
          "