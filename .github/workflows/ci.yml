name: CI/CD - Test, Train & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p models

      - name: Train & compare all models
        run: |
          echo "Lancement de l'entraînement..."
          python src/train.py

      - name: Show best model
        run: |
          python -c "
          import json
          with open('models/all_results.json') as f:
              d = json.load(f)
          print('=' * 50)
          print(f'Meilleur modele : {d[\"best_model\"]}')
          print(f'R2   : {d[\"best_metrics\"][\"R2\"]:.4f}')
          print(f'RMSE : {d[\"best_metrics\"][\"RMSE\"]:.4f}')
          print(f'MAE  : {d[\"best_metrics\"][\"MAE\"]:.4f}')
          print('=' * 50)
          "

      # ── Vérifier que les fichiers models existent ──────────────
      - name: Verify model files
        run: |
          echo "Vérification des fichiers générés..."
          ls -la models/
          echo "✅ Fichiers models présents"

      - name: Deploy to HuggingFace
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os

          api = HfApi()

          # 1. Uploader les fichiers du projet
          api.upload_folder(
              folder_path='.',
              repo_id='votre-username/advertising-regression',
              repo_type='space',
              token='$HF_TOKEN',
              ignore_patterns=[
                  'data/',
                  '.git/',
                  '__pycache__/',
                  '*.pyc',
                  '.gitignore',
                  'tests/',
                  'pipeline/'
              ]
              # models/ N'EST PAS dans ignore_patterns → sera uploadé ✅
          )
          print('✅ Projet uploadé')

          # 2. Vérifier que models/ a bien été uploadé
          files = api.list_repo_files(
              repo_id='votre-username/advertising-regression',
              repo_type='space',
              token='$HF_TOKEN'
          )
          model_files = [f for f in files if 'models/' in f]
          print(f'✅ Fichiers models sur HuggingFace : {model_files}')

          if not model_files:
              raise Exception('❌ models/ non uploadé sur HuggingFace !')

          print('Déploiement complet réussi !')
          "